version: "3"

services:

  mysql:
    image: avindock/mysql:8
    container_name: mysql-db-container
    environment:
      MYSQL_DATABASE: messagedb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

    volumes:
      - /home/ubuntu/volumes/mysql:/var/lib/mysql
    networks:
      - message-network

    restart: always

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10



  app:
    image: avindock/message-app
    container_name: message-app-container
    ports:
      - "5001:5001"
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: messagedb
    networks:
      - message-network
    depends_on:
      - mysql



volumes:
  mysql-data:

networks:
  message-network:  
